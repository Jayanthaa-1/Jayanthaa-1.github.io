<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Cybersecurity Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro Screen -->
<div id="intro-screen">
  <img src="logo.png" alt="Logo" id="logo">
  <h1>Welcome to My Portfolio</h1>
</div>

<!-- Main Content -->
<div id="portfolio-content">

  <header>
    <h1>My Cybersecurity Portfolio</h1>
    <a href="resume.pdf" class="download-btn" download>Download Resume</a>
  </header>

  <!-- Projects Section -->
  <section id="projects" class="section">
    <h2>Projects</h2>
    <div class="projects-grid">
      <button onclick="openProject('Keylogger with TOR Integration', 'Developed a Python-based keylogger for ethical testing and learning purposes. Implemented log encryption and anonymized data transfer via the TOR network.')">Keylogger with TOR Integration</button>

      <button onclick="openProject('Penetration Testing Toolkit', 'Created a lightweight penetration testing API with network scanning, MITM simulation, and exploit execution. Integrated results into a Flutter-based frontend.')">Penetration Testing Toolkit</button>

      <button onclick="openProject('Wi-Fi Deauthentication Attack Tool', 'Developed a Wi-Fi deauthentication attack tool using ESP32, emphasizing ethical usage and recommending WPA2/WPA3 protections.')">Wi-Fi Deauthentication Attack Tool</button>

      <button onclick="openProject('Network Reconnaissance Toolkit', 'Built a comprehensive network scanning toolkit using Kali Linux tools like nmap, arp-scan, netdiscover, and Wireshark.')">Network Reconnaissance Toolkit</button>

      <button onclick="openProject('Helmet Detection & Safety Automation', 'Built a YOLOv8-based real-time helmet detection model integrated with Raspberry Pi to prevent ignition without helmet detection.')">Helmet Detection & Safety Automation</button>
    </div>
  </section>

  <!-- Certificates Section -->
  <section id="certificates" class="section">
    <h2>Certificates</h2>
    <div class="certificates-grid">
      <div class="certificate-item" onclick="openCertificate('certificates/CEH.jpg')">
        <button>Certified Ethical Hacker (CEH)</button>
      </div>
      <div class="certificate-item" onclick="openCertificate('certificates/WebAppTesting.jpg')">
        <button>Web Application Penetration Testing</button>
      </div>
      <div class="certificate-item" onclick="openCertificate('certificates/NSE1.jpg')">
        <button>Network Security Expert (NSE 1)</button>
      </div>
      <div class="certificate-item" onclick="openCertificate('certificates/WiFiSecurity.jpg')">
        <button>Wi-Fi Security Specialist</button>
      </div>
      <div class="certificate-item" onclick="openCertificate('certificates/PythonCyber.jpg')">
        <button>Python for Cybersecurity</button>
      </div>
    </div>

    <!-- Certificate Popup -->
    <div id="popup" class="popup">
      <span class="close" onclick="closeCertificate()">&times;</span>
      <img id="popup-img" src="" alt="Certificate Preview">
    </div>
  </section>

</div>

<!-- Project Popup -->
<div id="project-popup">
  <div id="project-content">
    <span id="close-popup" onclick="closeProject()">&times;</span>
    <h2 id="project-title"></h2>
    <p id="project-description"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
