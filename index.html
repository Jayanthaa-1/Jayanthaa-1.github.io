<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro Screen -->
<div id="intro-screen">
  <img id="logo" src="penguin-small.png" alt="Logo">
  <h1>Welcome to My Portfolio</h1>
</div>

<!-- Toggle Dark Mode Button -->
<button class="toggle-theme" onclick="toggleTheme()">🌙</button>

<!-- Main Content -->
<div id="portfolio-content">
  <header>
    <h1>Hi, I'm [Jayantha]</h1>
    <a class="download-btn" href="your-resume.pdf" download>Download Resume</a>
  </header>

  <section class="section" id="projects">
    <h2>Projects</h2>
    <div class="projects-grid">
      <button onclick="openProject('Keylogger with TOR Integration (Python)', 'Developed a Python-based keylogger for educational purposes with TOR support.')">Keylogger with TOR Integration</button>
      <button onclick="openProject('Penetration Testing Toolkit', 'Created a pentesting toolkit using Kali Linux and Flask.')">Penetration Testing Toolkit</button>
      <button onclick="openProject('Wi-Fi Deauthentication Attack Tool', 'Built using ESP32 and Arduino IDE to simulate Wi-Fi attacks.')">Wi-Fi Deauthentication Attack Tool</button>
      <button onclick="openProject('Network Reconnaissance Toolkit', 'Made with Kali Linux tools like nmap, Wireshark, and more.')">Network Reconnaissance Toolkit</button>
      <button onclick="openProject('Helmet Detection & Safety Automation', 'YOLOv8 based helmet detection with Raspberry Pi automation.')">Helmet Detection & Safety Automation</button>
    </div>
  </section>

  <section class="section" id="certificates">
    <h2>Certificates</h2>
    <div class="certificates-grid">
      <div class="certificate-item"><button onclick="openPopup('cert1.jpg')">Google cyber security V2</button></div>
      <div class="certificate-item"><button onclick="openPopup('cert2.jpg')">Splunk </button></div>
      <div class="certificate-item"><button onclick="openPopup('cert3.jpg')">Cloud security</button></div>
      <div class="certificate-item"><button onclick="openPopup('cert4.jpg')">Cisco</button></div>
      <div class="certificate-item"><button onclick="openPopup('cert5.jpg')">Cisco</button></div>
    </div>
  </section>
</div>

<!-- Project Popup -->
<div id="project-popup">
  <div id="project-content">
    <span id="close-popup" onclick="closePopup()">&times;</span>
    <h2 id="popup-title"></h2>
    <p id="popup-description"></p>
  </div>
</div>

<!-- Certificate Popup -->
<div id="certificate-popup" class="popup">
  <span class="close" onclick="closePopup()">&times;</span>
  <img id="certificate-img" src="" alt="Certificate">
</div>

<script src="script.js"></script>
</body>
</html>
