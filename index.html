<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jayantha's Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== INTRO ANIMATION ===== */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a202c;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: white;
    }
    
    #welcome-text {
      font-size: 3rem;
      font-family: 'Fira Code', monospace;
      margin-bottom: 2rem;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.5s forwards 0.5s;
    }
    
    #intro-penguin {
      width: 150px;
      height: 150px;
      position: relative;
      animation: 
        float 3s ease-in-out infinite,
        tearDown 1.5s forwards 2s;
    }
    
    .paper {
      position: absolute;
      background: white;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: top center;
    }
    
    .paper.left {
      clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
      animation: tearLeft 1s forwards 2s;
    }
    
    .paper.right {
      clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
      animation: tearRight 1s forwards 2s;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes tearDown {
      0% { transform: translateY(0); }
      100% { transform: translateY(100vh); }
    }
    
    @keyframes tearLeft {
      100% { transform: rotate(-30deg) translateX(-50%) translateY(50%); }
    }
    
    @keyframes tearRight {
      100% { transform: rotate(30deg) translateX(50%) translateY(50%); }
    }
    
    /* Rest of your existing CSS... */
  </style>
</head>
<body>
  <!-- Intro Screen -->
  <div id="intro-screen">
    <div id="welcome-text">Welcome</div>
    <div id="intro-penguin">
      <img src="tux.png" alt="Tux" style="width:100%; position:relative; z-index:2;">
      <div class="paper left"></div>
      <div class="paper right"></div>
    </div>
  </div>

  <!-- Your existing portfolio content (hidden at first) -->
  <div id="portfolio-content" style="display:none;">
    <!-- ... Your existing header, sections, etc ... -->
  </div>

  <script>
    // After animations complete, show portfolio
    setTimeout(() => {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('portfolio-content').style.display = 'block';
      
      // Trigger content animations
      document.querySelectorAll('.fade-in').forEach(el => {
        el.style.animationPlayState = 'running';
      });
    }, 3500); // Matches total animation time
  </script>
</body>
</html>
